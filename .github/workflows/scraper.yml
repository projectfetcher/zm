name: Scrape Zambia Jobs

# Each country runs independently on its own schedule.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max jobs this run"
        default: "15"
      dry_run:
        description: "Dry run (no WordPress posting)?"
        type: boolean
        default: false

permissions:
  contents: write          # commit this country's tracker back to the repo

concurrency:
  group: scrape-zambia
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: zambia
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: zambia/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Zambia scraper
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          WP_BASE_URL:     ${{ secrets.WP_BASE_URL }}
          WP_USERNAME:     ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_VERIFY_SSL:   ${{ secrets.WP_VERIFY_SSL }}
        run: |
          python zm.py \
            --limit ${{ github.event.inputs.limit || '15' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Persist tracker
        if: always()
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "job-scraper-bot"
          git config user.email "actions@github.com"
          git add zambia/processed_zambia.csv zambia/scraped_zambia.csv || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(zambia): update tracker [skip ci] $(date -u +%F)"
            git push
          else
            echo "No tracker changes to commit."
          fi

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraped-zambia
          path: |
            zambia/scraped_zambia.csv
            zambia/processed_zambia.csv
          if-no-files-found: ignore
